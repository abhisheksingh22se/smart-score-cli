name: Smart Contract Scoring Audit

on:
  push:
    branches: [main]
    paths:
    - 'contracts/**'
    - 'src/**'
  workflow_dispatch:
    inputs:
      fvc:
        description: 'Formal Verification Coverage %'
        required: false
        default: '0.0'

# Cancel in-progress runs if a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate:
    name: 🎓 Smart Score Evaluation
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Local Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Run Containerized Smart Score Evaluator
      # This triggers your updated action.yml, which pulls the lean GHCR image
      # and natively executes Slither, Hardhat, and the Python engine in seconds.
      - name: Run Smart Score Evaluator
        uses: ./
        with:
          contract-path: 'contracts/Voting.sol'
          fvc: ${{ github.event.inputs.fvc || '0.0' }}
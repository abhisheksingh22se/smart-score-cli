name: 'Smart Score Evaluator'
description: 'Evaluate Solidity smart contracts on Security and Efficiency using a unified research-based framework.'

inputs:
  contract-path:
    description: 'Path to the Solidity smart contract file'
    required: false
    default: 'contracts/Voting.sol'
  slither-json-path:
    description: 'Path to the Slither JSON report file'
    required: false
    default: 'result/slither_output.json'
  gas-report-json-path:
    description: 'Path to the Hardhat gas reporter JSON output file'
    required: false
    default: 'hardhat_env/gasReporterOutput.json'
  fvc:
    description: 'Formal Verification Coverage percentage (0.0 to 100.0)'
    required: false
    default: '0.0'
  iv:
    description: 'Manual Invariant Violations count override'
    required: false
  gf:
    description: 'Manual Average Gas per Function override'
    required: false
  gv:
    description: 'Manual Gas Variance override'
    required: false
  benchmarks-path:
    description: 'Path to benchmarks.json file'
    required: false
  format:
    description: 'Output format: markdown (default) or json'
    required: false
    default: 'markdown'
  fail-on-critical:
    description: 'Fail the workflow if score is Critical (<0.40)'
    required: false
    default: 'true'

outputs:
  score:
    description: 'Calculated composite score (0.0 - 1.0)'
    value: ${{ steps.run-evaluation.outputs.score }}
  grade:
    description: 'Qualitative rating (Excellent, Good, Fair, Poor, Critical)'
    value: ${{ steps.run-evaluation.outputs.grade }}
  security-score:
    description: 'Calculated security sub-score (0.0 - 1.0)'
    value: ${{ steps.run-evaluation.outputs.security_score }}
  efficiency-score:
    description: 'Calculated efficiency sub-score (0.0 - 1.0)'
    value: ${{ steps.run-evaluation.outputs.efficiency_score }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      shell: bash
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install -r ${{ github.action_path }}/requirements.txt

    - name: Run Smart Score evaluation CLI
      shell: bash
      id: run-evaluation
      run: |
        ARGS=()
        ARGS+=("--contract-path" "${{ inputs.contract-path }}")

        if [ -f "${{ inputs.slither-json-path }}" ]; then
          ARGS+=("--slither-json" "${{ inputs.slither-json-path }}")
        fi

        if [ -f "${{ inputs.gas-report-json-path }}" ]; then
          ARGS+=("--gas-json" "${{ inputs.gas-report-json-path }}")
        fi

        if [ -n "${{ inputs.fvc }}" ]; then
          ARGS+=("--fvc" "${{ inputs.fvc }}")
        fi

        if [ -n "${{ inputs.iv }}" ]; then
          ARGS+=("--iv" "${{ inputs.iv }}")
        fi

        if [ -n "${{ inputs.gf }}" ]; then
          ARGS+=("--gf" "${{ inputs.gf }}")
        fi

        if [ -n "${{ inputs.gv }}" ]; then
          ARGS+=("--gv" "${{ inputs.gv }}")
        fi

        if [ -n "${{ inputs.benchmarks-path }}" ]; then
          ARGS+=("--benchmarks" "${{ inputs.benchmarks-path }}")
        else
          ARGS+=("--benchmarks" "${{ github.action_path }}/config/benchmarks.json")
        fi

        if [ "${{ inputs.fail-on-critical }}" = "false" ]; then
          ARGS+=("--no-fail")
        fi

        # Running markdown report for human-readable output 
        ARGS+=("--format" "markdown")
        PYTHONPATH=${{ github.action_path }} python3 ${{ github.action_path }}/src/cli.py "${ARGS[@]}"

        # Running JSON report separately to capture outputs 
        JSON_ARGS=("${ARGS[@]}")
        # Replace markdown with json
        JSON_ARGS[-1]="json"
        JSON_ARGS[-2]="--format"

        JSON_OUTPUT=$(PYTHONPATH=${{ github.action_path }} python3 \
          ${{ github.action_path }}/src/cli.py "${JSON_ARGS[@]}" --no-fail 2>/dev/null)

        # Writing outputs to GITHUB_OUTPUT 
        echo "score=$(echo "$JSON_OUTPUT"        | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['final_score'])")"      >> $GITHUB_OUTPUT
        echo "grade=$(echo "$JSON_OUTPUT"        | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['grade'])")"            >> $GITHUB_OUTPUT
        echo "security_score=$(echo "$JSON_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['security_score'])")" >> $GITHUB_OUTPUT
        echo "efficiency_score=$(echo "$JSON_OUTPUT"| python3 -c "import sys,json; d=json.load(sys.stdin); print(d['efficiency_score'])")" >> $GITHUB_OUTPUT

        # Quality gate re-run with original args to respect fail-on-critical
        if [ "${{ inputs.fail-on-critical }}" != "false" ]; then
          PYTHONPATH=${{ github.action_path }} python3 \
            ${{ github.action_path }}/src/cli.py "${ARGS[@]}" --format json > /dev/null
        fi